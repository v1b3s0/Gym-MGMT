name: Release

# Build the portable zips and attach them to a GitHub Release.
# Triggers on a version tag push (e.g. `git tag v0.1 && git push --tags`).
# Also allows manual runs (without releasing) for testing the build.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # the release job needs this to create the release

jobs:
  # One build per OS. jpackage can't cross-compile, so each portable image
  # must be produced on its own native runner.
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      # `shell: bash` makes ./gradlew work the same on Windows and Linux runners.
      # We regenerate the icons from source so they're always in sync with the code.
      - name: Build portable zip
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew generateIcon portableZip --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.os }}
          path: build/portable/*.zip
          if-no-files-found: error

  # Collect both zips and publish them as one release. Runs only for tag pushes,
  # so manual workflow_dispatch runs just build + upload without releasing.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
